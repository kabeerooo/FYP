# ──────────────────────────────────────────────────────────────────────
#  NeuroSight  –  .github/workflows/ci.yml
#  Continuous Integration Pipeline
#
#  Triggers on every push or PR to  main  or  develop.
#
#  Jobs:
#    1. lint    – flake8 style checks
#    2. test    – pytest with mocked Firebase + yfinance
#    3. docker  – build Docker image (push only on main)
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Python version used in all jobs (must match Dockerfile)
  PYTHON_VERSION: "3.11"
  # Docker Hub image name
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/neurosight-api

jobs:

  # ══════════════════════════════════════════════════════════════════
  #  Job 1: Lint
  # ══════════════════════════════════════════════════════════════════
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          # E501 = line too long (relaxed to 120)
          # W503 = line break before binary operator (style choice)
          flake8 backend/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=backend/tf311_fyp,backend/ml_models

  # ══════════════════════════════════════════════════════════════════
  #  Job 2: Test
  # ══════════════════════════════════════════════════════════════════
  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps
          pip install pytest pytest-asyncio httpx

      - name: Create dummy Firebase service account
        # Tests mock Firebase, but the file path must exist to avoid FileNotFoundError
        run: |
          echo '{"type":"service_account","project_id":"test","private_key_id":"x","private_key":"","client_email":"test@test.iam.gserviceaccount.com","client_id":"0","auth_uri":"","token_uri":"","auth_provider_x509_cert_url":"","client_x509_cert_url":""}' \
            > backend/firebase-service-account.json

      - name: Run tests
        working-directory: backend
        env:
          # Minimal env so the app doesn't crash on import
          FINNHUB_API_KEY:   "test_key"
          MARKETAUX_API_KEY: "test_key"
          GROQ_API_KEY:      "test_key"
          NEWS_API_KEY:      "test_key"
          SECRET_KEY:        "test_secret_key_for_ci"
          ALLOWED_ORIGINS:   "http://localhost"
        run: |
          pytest tests/ -v \
            --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml

  # ══════════════════════════════════════════════════════════════════
  #  Job 3: Docker build (and push on main)
  # ══════════════════════════════════════════════════════════════════
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    # Only push to Docker Hub on pushes to main (not PRs)
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only runs on main branch (where we actually push)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
